name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run backend tests
        run: go test ./...
      - name: Run frontend tests
        run: node --test frontend/*.test.js

  build:
    name: Build (${{ matrix.label }})
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            build_args: -tags webkit2_41
          - os: windows-latest
            label: Windows
            build_args: ""
          - os: macos-latest
            label: macOS
            build_args: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev pkg-config
      - name: Build application
        run: go run github.com/wailsapp/wails/v2/cmd/wails@v2.12.0 build ${{ matrix.build_args }}
