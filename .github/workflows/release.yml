name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    name: Build Release (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            slug: linux-amd64
            build_args: -tags webkit2_41
          - os: windows-latest
            label: Windows
            slug: windows-amd64
            build_args: ""
          - os: macos-latest
            label: macOS
            slug: macos
            build_args: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev pkg-config
      - name: Build application
        run: go run github.com/wailsapp/wails/v2/cmd/wails@v2.12.0 build ${{ matrix.build_args }}
      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          if [ "${{ runner.os }}" = "Linux" ]; then
            binary="$(find build/bin -maxdepth 1 -type f ! -name '*.exe' | head -n 1)"
            cp "$binary" "release/worthly-tracker-${{ matrix.slug }}"
          elif [ "${{ runner.os }}" = "Windows" ]; then
            binary="$(find build/bin -maxdepth 1 -type f -name '*.exe' | head -n 1)"
            cp "$binary" "release/worthly-tracker-${{ matrix.slug }}.exe"
          else
            app_bundle="$(find build/bin -maxdepth 1 -type d -name '*.app' | head -n 1)"
            ditto -c -k --keepParent "$app_bundle" "release/worthly-tracker-${{ matrix.slug }}.app.zip"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: worthly-tracker-${{ matrix.slug }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: release-artifacts/*
