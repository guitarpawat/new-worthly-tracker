name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    name: Build Release (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            slug: linux-amd64
            build_args: -tags webkit2_41
          - os: windows-latest
            label: Windows
            slug: windows-amd64
            build_args: ""
          - os: macos-latest
            label: macOS
            slug: macos
            build_args: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev pkg-config
      - name: Build application
        run: go run github.com/wailsapp/wails/v2/cmd/wails@v2.12.0 build ${{ matrix.build_args }}
      - name: Archive build output (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cd build
          zip -r "../release/worthly-tracker-${{ matrix.slug }}.zip" bin
      - name: Archive build output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path build/bin/* -DestinationPath release/worthly-tracker-${{ matrix.slug }}.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: worthly-tracker-${{ matrix.slug }}
          path: release/*.zip

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: master-${{ github.run_number }}
          name: master-${{ github.run_number }}
          generate_release_notes: true
          files: release-artifacts/**/*.zip
